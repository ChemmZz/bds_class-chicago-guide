<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Field Guide — Thrift Stores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Libre+Franklin:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guide.css">
</head>
<body class="guide-page">
  <header class="guide-header">

    <!-- Price tag cluster — left -->
    <svg class="header-tag header-tag--left"
         viewBox="0 0 90 76" width="90" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Main marigold price tag, rotated -7° -->
      <g transform="rotate(-7, 45, 39)">
        <path d="M 20 21 L 75 21 L 75 57 L 20 57 L 10 39 Z"
              fill="#e8900a" stroke="#1e0c04" stroke-width="2.5"/>
        <circle cx="13" cy="39" r="5" fill="#fdf8f0" stroke="#1e0c04" stroke-width="2"/>
        <line x1="26" y1="30" x2="68" y2="30" stroke="#1e0c04" stroke-width="2" opacity="0.45"/>
        <line x1="26" y1="39" x2="68" y2="39" stroke="#1e0c04" stroke-width="1" opacity="0.35"/>
        <line x1="26" y1="48" x2="54" y2="48" stroke="#1e0c04" stroke-width="1.5" opacity="0.4"/>
      </g>
      <!-- Small magenta accent tag, rotated +9° -->
      <g transform="rotate(9, 62, 15)">
        <rect x="44" y="4" width="34" height="21" rx="3"
              fill="#cc2070" stroke="#1e0c04" stroke-width="2"/>
        <circle cx="48" cy="14.5" r="3" fill="#fdf8f0" stroke="#1e0c04" stroke-width="1.5"/>
      </g>
      <!-- Twine string connecting the two holes -->
      <path d="M 11 30 Q 24 8 47 12"
            stroke="#1e0c04" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    </svg>

    <div class="header-nav">
      <a href="../index.html" class="back-link">← Gallery</a>
      <a href="index.html" class="back-link">Journal</a>
    </div>
    <div class="guide-title">
      <span class="guide-title__city">CHICAGO</span>
      <span class="guide-title__sub">Field Guide</span>
    </div>
    <div class="chicago-stars" aria-hidden="true">★ ★ ★ ★</div>

    <!-- Price tag cluster — right (CSS-mirrored) -->
    <svg class="header-tag header-tag--right"
         viewBox="0 0 90 76" width="90" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g transform="rotate(-7, 45, 39)">
        <path d="M 20 21 L 75 21 L 75 57 L 20 57 L 10 39 Z"
              fill="#e8900a" stroke="#1e0c04" stroke-width="2.5"/>
        <circle cx="13" cy="39" r="5" fill="#fdf8f0" stroke="#1e0c04" stroke-width="2"/>
        <line x1="26" y1="30" x2="68" y2="30" stroke="#1e0c04" stroke-width="2" opacity="0.45"/>
        <line x1="26" y1="39" x2="68" y2="39" stroke="#1e0c04" stroke-width="1" opacity="0.35"/>
        <line x1="26" y1="48" x2="54" y2="48" stroke="#1e0c04" stroke-width="1.5" opacity="0.4"/>
      </g>
      <g transform="rotate(9, 62, 15)">
        <rect x="44" y="4" width="34" height="21" rx="3"
              fill="#cc2070" stroke="#1e0c04" stroke-width="2"/>
        <circle cx="48" cy="14.5" r="3" fill="#fdf8f0" stroke="#1e0c04" stroke-width="1.5"/>
      </g>
      <path d="M 11 30 Q 24 8 47 12"
            stroke="#1e0c04" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
    </svg>

  </header>
  <div class="guide-layout">
    <aside class="guide-sidebar">
      <section class="tag-bar">
        <p class="tag-bar__label">Filter by type</p>
        <div class="tag-grid">
          <button class="tag-btn" data-tag="vintage">Vintage</button>
          <button class="tag-btn" data-tag="records">Records</button>
          <button class="tag-btn" data-tag="antiques">Antiques</button>
          <button class="tag-btn" data-tag="clothing">Clothing</button>
          <button class="tag-btn" data-tag="nightlife">Nightlife</button>
          <button class="tag-btn" data-tag="cafe">Café</button>
        </div>
        <button class="tag-clear-btn" id="clearTags">Clear filters</button>
      </section>
      <p class="results-count" id="resultsCount"></p>
      <div class="spots-grid" id="spotsGrid"></div>
    </aside>
    <div class="guide-map-panel">
      <div id="map"></div>
      <div class="route-info" id="routeInfo" hidden>
        <span class="route-info__icon">⬡</span>
        <span class="route-info__text">Optimized route · <span id="stopCount"></span> stops</span>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="guide.js"></script>
</body>
</html>
