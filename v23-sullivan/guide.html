<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Field Guide — Louis Sullivan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300;1,8..60,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guide.css">
</head>
<body class="guide-page">
  <header class="guide-header">
    <div class="header-nav">
      <a href="../index.html" class="back-link">← Gallery</a>
      <a href="index.html" class="back-link">Journal</a>
    </div>
    <div class="guide-title">
      <span class="guide-title__city">CHICAGO</span>
      <span class="guide-title__sub">Field Guide</span>
    </div>
    <div class="chicago-stars" aria-hidden="true">★ ★ ★ ★</div>

    <!-- Sullivan ornament — left -->
    <svg class="header-ornament header-ornament--left"
         viewBox="0 0 100 76" width="100" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Central vertical stem -->
      <path d="M 32 76 Q 30 64 31 52 Q 32 40 31 28"
            stroke="#c4622a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Upper palmette -->
      <path d="M 16 26 Q 20 10 31 6 Q 42 10 46 26 Q 38 18 31 16 Q 24 18 16 26 Z"
            fill="#c4622a" stroke="#1a0e04" stroke-width="1.5"/>
      <!-- Palmette center vein -->
      <path d="M 27 26 Q 29 16 31 10 Q 33 16 35 24"
            stroke="#8a3a18" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Left scroll tendril -->
      <path d="M 29 50 Q 10 48 6 36 Q 3 26 12 22 Q 10 30 14 34 Q 18 38 27 46"
            stroke="#c4622a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Left scroll terminal -->
      <circle cx="10" cy="24" r="4.5" fill="none" stroke="#c4622a" stroke-width="1.5"/>
      <circle cx="10" cy="24" r="1.5" fill="#c4622a"/>
      <!-- Right scroll tendril -->
      <path d="M 33 50 Q 52 48 56 36 Q 59 26 50 22 Q 52 30 48 34 Q 44 38 35 46"
            stroke="#c4622a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Right scroll terminal -->
      <circle cx="52" cy="24" r="4.5" fill="none" stroke="#c4622a" stroke-width="1.5"/>
      <circle cx="52" cy="24" r="1.5" fill="#c4622a"/>
      <!-- Left leaf pair -->
      <path d="M 22 52 Q 8 48 10 38 Q 16 44 21 50 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 22 62 Q 7 60 9 50 Q 15 56 21 61 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <!-- Right leaf pair -->
      <path d="M 40 52 Q 54 48 52 38 Q 46 44 41 50 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 40 62 Q 55 60 53 50 Q 47 56 41 61 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <!-- Lower acanthus base -->
      <path d="M 18 70 Q 22 62 31 60 Q 40 62 44 70 Q 36 66 31 65 Q 26 66 18 70 Z"
            fill="#c4622a" stroke="#1a0e04" stroke-width="1.5"/>
      <!-- Stem base block -->
      <rect x="28" y="72" width="6" height="4" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
      <!-- Small decorative buds on tendrils -->
      <circle cx="18" cy="40" r="2.5" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
      <circle cx="44" cy="40" r="2.5" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
    </svg>

    <!-- Sullivan ornament — right (CSS-mirrored) -->
    <svg class="header-ornament header-ornament--right"
         viewBox="0 0 100 76" width="100" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M 32 76 Q 30 64 31 52 Q 32 40 31 28"
            stroke="#c4622a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 16 26 Q 20 10 31 6 Q 42 10 46 26 Q 38 18 31 16 Q 24 18 16 26 Z"
            fill="#c4622a" stroke="#1a0e04" stroke-width="1.5"/>
      <path d="M 27 26 Q 29 16 31 10 Q 33 16 35 24"
            stroke="#8a3a18" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M 29 50 Q 10 48 6 36 Q 3 26 12 22 Q 10 30 14 34 Q 18 38 27 46"
            stroke="#c4622a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="10" cy="24" r="4.5" fill="none" stroke="#c4622a" stroke-width="1.5"/>
      <circle cx="10" cy="24" r="1.5" fill="#c4622a"/>
      <path d="M 33 50 Q 52 48 56 36 Q 59 26 50 22 Q 52 30 48 34 Q 44 38 35 46"
            stroke="#c4622a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="52" cy="24" r="4.5" fill="none" stroke="#c4622a" stroke-width="1.5"/>
      <circle cx="52" cy="24" r="1.5" fill="#c4622a"/>
      <path d="M 22 52 Q 8 48 10 38 Q 16 44 21 50 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 22 62 Q 7 60 9 50 Q 15 56 21 61 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 40 52 Q 54 48 52 38 Q 46 44 41 50 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 40 62 Q 55 60 53 50 Q 47 56 41 61 Z"
            fill="#6a8a5a" stroke="#1a0e04" stroke-width="1.2"/>
      <path d="M 18 70 Q 22 62 31 60 Q 40 62 44 70 Q 36 66 31 65 Q 26 66 18 70 Z"
            fill="#c4622a" stroke="#1a0e04" stroke-width="1.5"/>
      <rect x="28" y="72" width="6" height="4" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
      <circle cx="18" cy="40" r="2.5" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
      <circle cx="44" cy="40" r="2.5" fill="#c4622a" stroke="#1a0e04" stroke-width="1"/>
    </svg>
  </header>

  <div class="guide-layout">
    <aside class="guide-sidebar">
      <section class="tag-bar">
        <p class="tag-bar__label">Filter by vibe</p>
        <div class="tag-grid">
          <button class="tag-btn" data-tag="architecture">Architecture</button>
          <button class="tag-btn" data-tag="music">Music</button>
          <button class="tag-btn" data-tag="nightlife">Nightlife</button>
          <button class="tag-btn" data-tag="jazz">Jazz</button>
          <button class="tag-btn" data-tag="doors">Doors</button>
          <button class="tag-btn" data-tag="cafe">Café</button>
        </div>
        <button class="tag-clear-btn" id="clearTags">Show all</button>
      </section>
      <p class="results-count" id="resultsCount">Showing all 25 spots</p>
      <div class="spots-grid" id="spotsGrid"></div>
    </aside>
    <main class="guide-map-panel">
      <div id="map"></div>
      <div class="route-info" id="routeInfo" hidden>
        <span class="route-info__icon">↗</span>
        <span class="route-info__text">Optimized route &middot; <span id="stopCount">0</span> stops</span>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="guide.js"></script>
</body>
</html>
