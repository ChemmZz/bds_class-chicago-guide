<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Field Guide — Art Deco / 1893</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guide.css">
</head>
<body class="guide-page">
  <header class="guide-header">
    <div class="header-nav">
      <a href="../index.html" class="back-link">← Gallery</a>
      <a href="index.html" class="back-link">Journal</a>
    </div>
    <div class="guide-title">
      <span class="guide-title__city">CHICAGO</span>
      <span class="guide-title__sub">Field Guide</span>
    </div>
    <div class="chicago-stars" aria-hidden="true">★ ★ ★ ★</div>

    <!-- Art Deco sunburst fan — left -->
    <svg class="header-deco header-deco--left"
         viewBox="0 0 110 76" width="110" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Radiating rays from bottom-left origin point -->
      <g stroke="#c8a84b" fill="none">
        <line x1="2" y1="75" x2="110" y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="96"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="80"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="64"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="48"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="32"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="16"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="2"   y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="14" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="30" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="46" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="62" stroke-width="1.2"/>
      </g>
      <!-- Concentric arc 1 — outer -->
      <path d="M 2 17 A 58 58 0 0 1 60 75" stroke="#c8a84b" stroke-width="2" fill="none"/>
      <!-- Concentric arc 2 — middle -->
      <path d="M 2 39 A 36 36 0 0 1 38 75" stroke="#c8a84b" stroke-width="2" fill="none"/>
      <!-- Concentric arc 3 — inner -->
      <path d="M 2 57 A 18 18 0 0 1 20 75" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
      <!-- Thin echo arcs -->
      <path d="M 2 12 A 63 63 0 0 1 65 75" stroke="#c8a84b" stroke-width="0.6" fill="none" opacity="0.5"/>
      <path d="M 2 22 A 53 53 0 0 1 55 75" stroke="#c8a84b" stroke-width="0.6" fill="none" opacity="0.5"/>
      <!-- Geometric diamond at origin -->
      <polygon points="2,69 7,75 2,81 -3,75" fill="#c8a84b"/>
      <!-- Double-line accent on outermost ray -->
      <line x1="5"  y1="75" x2="110" y2="3"  stroke="#c8a84b" stroke-width="0.5" opacity="0.4"/>
      <line x1="-1" y1="75" x2="107" y2="0"  stroke="#c8a84b" stroke-width="0.5" opacity="0.4"/>
    </svg>

    <!-- Art Deco sunburst fan — right (CSS-mirrored) -->
    <svg class="header-deco header-deco--right"
         viewBox="0 0 110 76" width="110" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g stroke="#c8a84b" fill="none">
        <line x1="2" y1="75" x2="110" y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="96"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="80"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="64"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="48"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="32"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="16"  y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="2"   y2="0"  stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="14" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="30" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="46" stroke-width="1.2"/>
        <line x1="2" y1="75" x2="110" y2="62" stroke-width="1.2"/>
      </g>
      <path d="M 2 17 A 58 58 0 0 1 60 75" stroke="#c8a84b" stroke-width="2" fill="none"/>
      <path d="M 2 39 A 36 36 0 0 1 38 75" stroke="#c8a84b" stroke-width="2" fill="none"/>
      <path d="M 2 57 A 18 18 0 0 1 20 75" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
      <path d="M 2 12 A 63 63 0 0 1 65 75" stroke="#c8a84b" stroke-width="0.6" fill="none" opacity="0.5"/>
      <path d="M 2 22 A 53 53 0 0 1 55 75" stroke="#c8a84b" stroke-width="0.6" fill="none" opacity="0.5"/>
      <polygon points="2,69 7,75 2,81 -3,75" fill="#c8a84b"/>
      <line x1="5"  y1="75" x2="110" y2="3"  stroke="#c8a84b" stroke-width="0.5" opacity="0.4"/>
      <line x1="-1" y1="75" x2="107" y2="0"  stroke="#c8a84b" stroke-width="0.5" opacity="0.4"/>
    </svg>
  </header>

  <div class="guide-layout">
    <aside class="guide-sidebar">
      <section class="tag-bar">
        <p class="tag-bar__label">Filter by vibe</p>
        <div class="tag-grid">
          <button class="tag-btn" data-tag="architecture">Architecture</button>
          <button class="tag-btn" data-tag="music">Music</button>
          <button class="tag-btn" data-tag="nightlife">Nightlife</button>
          <button class="tag-btn" data-tag="jazz">Jazz</button>
          <button class="tag-btn" data-tag="doors">Doors</button>
          <button class="tag-btn" data-tag="cafe">Café</button>
        </div>
        <button class="tag-clear-btn" id="clearTags">Show all</button>
      </section>
      <p class="results-count" id="resultsCount">Showing all 25 spots</p>
      <div class="spots-grid" id="spotsGrid"></div>
    </aside>
    <main class="guide-map-panel">
      <div id="map"></div>
      <div class="route-info" id="routeInfo" hidden>
        <span class="route-info__icon">↗</span>
        <span class="route-info__text">Optimized route &middot; <span id="stopCount">0</span> stops</span>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="guide.js"></script>
</body>
</html>
