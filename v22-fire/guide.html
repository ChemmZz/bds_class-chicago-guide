<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicago Field Guide — Great Chicago Fire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guide.css">
</head>
<body class="guide-page">
  <header class="guide-header">
    <div class="header-nav">
      <a href="../index.html" class="back-link">← Gallery</a>
      <a href="index.html" class="back-link">Journal</a>
    </div>
    <div class="guide-title">
      <span class="guide-title__city">Chicago</span>
      <span class="guide-title__sub">Field Guide</span>
    </div>
    <div class="chicago-stars" aria-hidden="true">★ ★ ★ ★</div>

    <!-- Flame cluster — left -->
    <svg class="header-flame header-flame--left"
         viewBox="0 0 100 76" width="100" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Flame A — tall back flame -->
      <path d="M 22 76 Q 16 56 22 40 Q 28 24 20 10 Q 36 22 38 44 Q 40 62 28 76 Z"
            fill="#9a2800" stroke="#1a0800" stroke-width="1.5"/>
      <!-- Flame B — main center flame -->
      <path d="M 36 76 Q 28 58 36 42 Q 42 26 34 12 Q 52 26 52 48 Q 52 64 44 76 Z"
            fill="#d94f0a" stroke="#1a0800" stroke-width="1.5"/>
      <!-- Flame C — small front flame -->
      <path d="M 10 76 Q 7 62 15 50 Q 22 38 16 26 Q 28 36 28 54 Q 28 68 18 76 Z"
            fill="#e8820a" stroke="#1a0800" stroke-width="1.5"/>
      <!-- Bright inner core of flame B -->
      <path d="M 36 76 Q 32 64 38 50 Q 42 40 38 30 Q 46 40 46 58 Q 46 70 40 76 Z"
            fill="#f0a020" stroke="none"/>
      <!-- Inner highlight -->
      <path d="M 37 54 Q 36 46 40 40 Q 43 46 42 54 Q 41 58 40 60 Q 39 58 37 54 Z"
            fill="#ffe060" stroke="none"/>
      <!-- Tip of flame B -->
      <path d="M 38 20 Q 40 12 42 20 Q 41 23 40 23 Q 39 23 38 20 Z"
            fill="#fff0a0" stroke="none"/>
      <!-- Ember glow at base -->
      <ellipse cx="30" cy="75" rx="26" ry="3" fill="#ff4000" opacity="0.45"/>
      <!-- Floating ember sparks -->
      <circle cx="58" cy="50" r="2"   fill="#ff8000" opacity="0.6"/>
      <circle cx="64" cy="36" r="1.5" fill="#ffa000" opacity="0.5"/>
      <circle cx="68" cy="58" r="1"   fill="#ff6000" opacity="0.4"/>
      <circle cx="72" cy="44" r="1.5" fill="#ffb000" opacity="0.4"/>
    </svg>

    <!-- Flame cluster — right (CSS-mirrored) -->
    <svg class="header-flame header-flame--right"
         viewBox="0 0 100 76" width="100" height="76"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M 22 76 Q 16 56 22 40 Q 28 24 20 10 Q 36 22 38 44 Q 40 62 28 76 Z"
            fill="#9a2800" stroke="#1a0800" stroke-width="1.5"/>
      <path d="M 36 76 Q 28 58 36 42 Q 42 26 34 12 Q 52 26 52 48 Q 52 64 44 76 Z"
            fill="#d94f0a" stroke="#1a0800" stroke-width="1.5"/>
      <path d="M 10 76 Q 7 62 15 50 Q 22 38 16 26 Q 28 36 28 54 Q 28 68 18 76 Z"
            fill="#e8820a" stroke="#1a0800" stroke-width="1.5"/>
      <path d="M 36 76 Q 32 64 38 50 Q 42 40 38 30 Q 46 40 46 58 Q 46 70 40 76 Z"
            fill="#f0a020" stroke="none"/>
      <path d="M 37 54 Q 36 46 40 40 Q 43 46 42 54 Q 41 58 40 60 Q 39 58 37 54 Z"
            fill="#ffe060" stroke="none"/>
      <path d="M 38 20 Q 40 12 42 20 Q 41 23 40 23 Q 39 23 38 20 Z"
            fill="#fff0a0" stroke="none"/>
      <ellipse cx="30" cy="75" rx="26" ry="3" fill="#ff4000" opacity="0.45"/>
      <circle cx="58" cy="50" r="2"   fill="#ff8000" opacity="0.6"/>
      <circle cx="64" cy="36" r="1.5" fill="#ffa000" opacity="0.5"/>
      <circle cx="68" cy="58" r="1"   fill="#ff6000" opacity="0.4"/>
      <circle cx="72" cy="44" r="1.5" fill="#ffb000" opacity="0.4"/>
    </svg>
  </header>

  <div class="guide-layout">
    <aside class="guide-sidebar">
      <section class="tag-bar">
        <p class="tag-bar__label">Filter by vibe</p>
        <div class="tag-grid">
          <button class="tag-btn" data-tag="architecture">Architecture</button>
          <button class="tag-btn" data-tag="music">Music</button>
          <button class="tag-btn" data-tag="nightlife">Nightlife</button>
          <button class="tag-btn" data-tag="jazz">Jazz</button>
          <button class="tag-btn" data-tag="doors">Doors</button>
          <button class="tag-btn" data-tag="cafe">Café</button>
        </div>
        <button class="tag-clear-btn" id="clearTags">Show all</button>
      </section>
      <p class="results-count" id="resultsCount">Showing all 25 spots</p>
      <div class="spots-grid" id="spotsGrid"></div>
    </aside>
    <main class="guide-map-panel">
      <div id="map"></div>
      <div class="route-info" id="routeInfo" hidden>
        <span class="route-info__icon">↗</span>
        <span class="route-info__text">Optimized route &middot; <span id="stopCount">0</span> stops</span>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="guide.js"></script>
</body>
</html>
